      \    pm.response.to.have.status(200);\r

      });\r

      \r

      pm.test(\"Response contains correct Book Metadata\", () => {\r

      \    // Validate the ID we captured earlier\r

      \    pm.expect(response.id).to.equal(Number(expectedId));\r

      \    \r

      \    // Validate specific string values\r

      \    pm.expect(response.entityType).to.equal(\"BOOK\");\r

      \    pm.expect(response.type).to.be.oneOf([\"fiction\",
      \"non-fiction\"]);\r

