$kind: http-request
url: "{{baseUrl}}/orders"
method: GET
body:
  type: json
  content: ""
scripts:
  - type: afterResponse
    code: "const response = pm.response.json();\r

      const savedOrderId = pm.globals.get(\"lastOrderId\");\r

      \r

      pm.test(\"Status code is 200\", () => {\r

      \    pm.response.to.have.status(200);\r

      });\r

      \r

      pm.test(\"Response is an array\", () => {\r

      \    pm.expect(response).to.be.an('array');\r

      });\r

      \r

      pm.test(\"Each order has required fields\", () => {\r

      \    response.forEach((order) => {\r

      \        pm.expect(order).to.have.property('id');\r

      \        pm.expect(order).to.have.property('bookId');\r

      \        pm.expect(order).to.have.property('customerName');\r

      \        pm.expect(order).to.have.property('quantity');\r

      \    });\r

      });\r

      \r

      // This links your POST request to this GET request\r

      pm.test(\"Newly created order is present in the list\", () => {\r

      \    const myOrder = response.find(order => order.id === savedOrderId);\r

      \    \r

      \    pm.expect(myOrder, \"Order ID from previous POST not found in
      list\").to.not.be.undefined;\r

      \    console.log(\"Found our order in the list:\", myOrder);\r

      });"
    language: text/javascript
  - type: beforeRequest
    code: "// Pre-request script for Orders folder/requests\r

      const accessToken = pm.environment.get(\"accessToken\");\r

      \r

      if (!accessToken) {\r

      \    console.error(\"accessToken is not set. Ensure 'Register API Client'
      runs first.\");\r

      \    throw new Error(\"Missing accessToken - cannot authenticate order
      requests\");\r

      }"
    language: text/javascript
order: 6000
