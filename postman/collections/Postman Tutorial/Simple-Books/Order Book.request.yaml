$kind: http-request
url: "{{baseUrl}}/orders"
method: POST
body:
  type: json
  content: "{\r

    \  \"bookId\": {{bookId}},\r

    \  \"customerName\": \"{{$randomFullName}}\"\r

    }"
auth:
  type: bearer
  credentials:
    token: "{{accessToken}}"
scripts:
  - type: afterResponse
    code: "// Parse response\r

      const response = pm.response.json();\r

      \r

      pm.test(\"Status code is 201 Created\", () => {\r

      \    pm.response.to.have.status(201);\r

      });\r

      \r

      pm.test(\"Response body has the correct structure\", () => {\r

      \    pm.expect(response).to.have.property('created');\r

      \    pm.expect(response).to.have.property('orderId');\r

      });\r

      \r

      pm.test(\"Order confirmation is true\", () => {\r

      \    pm.expect(response.created).to.be.true;\r

      });\r

      \r

      pm.test(\"OrderID is a valid string\", () => {\r

      \    pm.expect(response.orderId).to.be.a('string');\r

      \    // Ensure the ID isn't empty\r

      \    pm.expect(response.orderId.length).to.be.above(0);\r

      });\r

      \r

      // Capture the Order ID for future requests (like GET or DELETE order)\r

      if (response.created === true) {\r

      \    pm.globals.set(\"lastOrderId\", response.orderId);\r

      \    console.log(\"Saved Order ID:\", response.orderId);\r

      }"
    language: text/javascript
  - type: beforeRequest
    code: "// Pre-request script for Orders folder/requests\r

      const accessToken = pm.environment.get(\"accessToken\");\r

      \r

      if (!accessToken) {\r

      \    console.error(\"accessToken is not set. Ensure 'Register API Client'
      runs first.\");\r

      \    throw new Error(\"Missing accessToken - cannot authenticate order
      requests\");\r

      }"
    language: text/javascript
order: 5000
